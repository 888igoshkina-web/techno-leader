<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Путь технолидера</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0ede6;--bg2:#fff;--bg3:#fafaf8;--txt:#1a1a1a;--txt2:#555;--txt3:#888;
  --brd:#e5e3dc;--brd2:#ccc;
  --g-bg:#f0fdf4;--g-brd:#86efac;--g-txt:#15803d;
  --r-bg:#fef2f2;--r-brd:#fca5a5;--r-txt:#b91c1c;
  --w-bg:#fffbeb;--w-brd:#fcd34d;--w-txt:#b45309;
  --b-bg:#eff6ff;--b-brd:#93c5fd;--b-txt:#1d4ed8;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;-webkit-text-size-adjust:100%;}
#app{max-width:580px;margin:0 auto;padding:12px 12px calc(env(safe-area-inset-bottom,0px) + 60px);}
@media(min-width:600px){#app{padding:20px 16px 60px;}}
.header{background:var(--bg2);border-radius:12px;padding:12px 14px;margin-bottom:10px;border:1px solid var(--brd);}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:6px;flex-wrap:wrap;}
.co-name{font-size:13px;font-weight:600;flex:1;min-width:0;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
.kpi{text-align:center;}
.kpi-val{font-size:13px;font-weight:600;}
@media(min-width:400px){.kpi-val{font-size:15px;}}
.kpi-val.up{color:var(--g-txt);}
.kpi-val.dn{color:var(--r-txt);}
.kpi-lbl{font-size:9px;color:var(--txt3);margin-top:1px;}
.path-wrap{background:var(--bg2);border-radius:12px;padding:10px 12px;margin-bottom:10px;border:1px solid var(--brd);}
.path-title{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--txt3);margin-bottom:6px;}
.path-bar{display:flex;align-items:center;}
.ps{display:flex;flex-direction:column;align-items:center;flex:1;}
.pd{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;border:2px solid var(--brd2);background:var(--bg3);color:var(--txt3);flex-shrink:0;}
.pd.done{background:var(--g-txt);border-color:var(--g-txt);color:#fff;}
.pd.active{background:var(--txt);border-color:var(--txt);color:#fff;}
.pd.bad{background:var(--r-txt);border-color:var(--r-txt);color:#fff;}
.pl{font-size:8px;color:var(--txt3);margin-top:2px;text-align:center;max-width:44px;line-height:1.3;}
.pl.active{color:var(--txt);font-weight:600;}
.pline{flex:1;height:2px;background:var(--brd);max-width:14px;}
.pline.done{background:var(--g-txt);}
.card{background:var(--bg2);border-radius:12px;padding:14px 14px;margin-bottom:10px;border:1px solid var(--brd);}
@media(min-width:500px){.card{padding:18px 20px;}}
.card-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--txt3);margin-bottom:5px;}
.card-title{font-size:15px;font-weight:700;line-height:1.4;margin-bottom:8px;}
@media(min-width:500px){.card-title{font-size:17px;}}
.card-body{font-size:13px;color:var(--txt2);line-height:1.7;}
.card-body b{color:var(--txt);}
.info-box{background:var(--b-bg);border:1px solid var(--b-brd);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--b-txt);line-height:1.65;margin-top:8px;}
.warn-strip{background:var(--w-bg);border:1px solid var(--w-brd);border-radius:10px;padding:9px 12px;font-size:12px;color:var(--w-txt);line-height:1.65;margin-top:8px;}
.collapsible-text.collapsed{max-height:72px;overflow:hidden;-webkit-mask-image:linear-gradient(black 40%,transparent);mask-image:linear-gradient(black 40%,transparent);}
.show-more-btn{background:none;border:none;color:var(--b-txt);font-size:12px;font-weight:600;cursor:pointer;padding:4px 0;margin-top:4px;font-family:inherit;display:block;}
.choices{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.choice{background:var(--bg2);border:1.5px solid var(--brd);border-radius:12px;padding:12px 13px;cursor:pointer;text-align:left;font-family:inherit;font-size:13px;color:var(--txt);-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:background .1s;}
@media(min-width:500px){.choice{padding:13px 15px;font-size:14px;}}
.choice:active:not(:disabled){background:var(--bg3);}
@media(hover:hover){.choice:hover:not(:disabled){border-color:var(--brd2);background:var(--bg3);}}
.choice:disabled{opacity:.35;cursor:not-allowed;}
.cn{font-weight:600;margin-bottom:3px;line-height:1.4;}
.cm{font-size:11px;color:var(--txt3);line-height:1.5;}
.choice.sg{border-color:var(--g-brd);background:var(--g-bg);}
.choice.sw{border-color:var(--w-brd);background:var(--w-bg);}
.choice.sb{border-color:var(--r-brd);background:var(--r-bg);}
.result{border-radius:12px;padding:13px 14px;margin-bottom:10px;display:none;}
.result.show{display:block;}
.result.good{background:var(--g-bg);border:1.5px solid var(--g-brd);}
.result.bad{background:var(--r-bg);border:1.5px solid var(--r-brd);}
.result.warn{background:var(--w-bg);border:1.5px solid var(--w-brd);}
.ri{font-size:20px;margin-bottom:4px;}
.rh{font-size:14px;font-weight:700;margin-bottom:4px;}
.result.good .rh{color:var(--g-txt);}
.result.bad .rh{color:var(--r-txt);}
.result.warn .rh{color:var(--w-txt);}
.rt{font-size:13px;color:var(--txt2);line-height:1.65;}
.deltas{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px;}
.delta{font-size:11px;padding:2px 7px;border-radius:20px;font-weight:600;}
.dp{background:#dcfce7;color:var(--g-txt);}
.dn{background:#fee2e2;color:var(--r-txt);}
.dw{background:#fef3c7;color:var(--w-txt);}
.rl{font-size:12px;color:var(--txt3);margin-top:8px;padding-top:8px;border-top:1px solid rgba(0,0,0,.07);font-style:italic;line-height:1.6;}
.btn-next{width:100%;padding:15px;background:var(--txt);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;display:none;margin-bottom:8px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.btn-next.show{display:block;}
.btn-next:active{opacity:.85;}
.btn-big{width:100%;padding:15px;background:var(--txt);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.btn-big:active{opacity:.85;}
.btn-back{width:100%;padding:12px;background:transparent;color:var(--txt3);border:1px solid var(--brd);border-radius:12px;font-size:13px;cursor:pointer;font-family:inherit;margin-bottom:10px;-webkit-tap-highlight-color:transparent;}
.btn-back:active{background:var(--bg3);}
.m-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:14px 0;}
.mrow{background:var(--bg3);border:1px solid var(--brd);border-radius:10px;padding:10px 12px;}
.ml{font-size:10px;color:var(--txt3);margin-bottom:2px;}
.mv{font-size:14px;font-weight:600;}
.final-card{background:var(--bg2);border-radius:12px;padding:18px 14px;text-align:center;border:1px solid var(--brd);margin-bottom:10px;}
@media(min-width:500px){.final-card{padding:26px 22px;}}
.fscore{font-size:42px;font-weight:700;margin:6px 0;}
.frating{font-size:17px;font-weight:700;margin-bottom:6px;}
.fgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0;}
.fkpi{background:var(--bg3);border:1px solid var(--brd);border-radius:10px;padding:10px;}
.fv{font-size:17px;font-weight:700;}
.fl{font-size:10px;color:var(--txt3);margin-top:2px;}
#funds-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);z-index:1000;align-items:flex-end;justify-content:center;}
@media(min-width:500px){#funds-modal{align-items:center;}}
#funds-modal[style*="block"]{display:flex!important;}
.funds-modal-inner{background:var(--bg2);border-radius:20px 20px 0 0;padding:22px 18px calc(env(safe-area-inset-bottom,16px) + 8px);width:100%;max-width:480px;}
@media(min-width:500px){.funds-modal-inner{border-radius:16px;padding:24px 22px;width:90%;}}
.fm-icon{font-size:30px;margin-bottom:6px;text-align:center;}
.fm-title{font-size:17px;font-weight:700;margin-bottom:5px;color:var(--r-txt);text-align:center;}
.fm-text{font-size:13px;color:var(--txt2);margin-bottom:14px;line-height:1.6;text-align:center;}
.fm-choices{display:flex;flex-direction:column;gap:8px;}
.fm-btn{width:100%;padding:13px 14px;border:1.5px solid var(--brd2);border-radius:11px;background:var(--bg3);color:var(--txt);font-family:inherit;font-size:13px;cursor:pointer;text-align:left;line-height:1.5;-webkit-tap-highlight-color:transparent;}
.fm-btn:active{background:var(--bg2);}
.fm-btn small{font-size:11px;color:var(--txt3);display:block;}
.fm-btn.warn{border-color:var(--r-brd);}
.fm-btn.cancel{background:transparent;border-color:var(--brd);color:var(--txt3);text-align:center;}
.fm-disabled{padding:10px 14px;border-radius:11px;background:var(--bg3);font-size:13px;color:var(--txt3);border:1.5px solid var(--brd);opacity:.5;}
.debt-badge{font-size:10px;background:var(--r-bg);color:var(--r-txt);border:1px solid var(--r-brd);padding:2px 6px;border-radius:20px;margin-left:4px;white-space:nowrap;}
.months-badge{font-size:10px;background:var(--b-bg);color:var(--b-txt);border:1px solid var(--b-brd);padding:2px 6px;border-radius:20px;white-space:nowrap;}
.history{background:var(--bg2);border-radius:12px;padding:12px 14px;margin-bottom:10px;border:1px solid var(--brd);}
.history-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--txt3);margin-bottom:8px;}
.h-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid var(--brd);font-size:12px;color:var(--txt2);}
.h-item:last-child{border-bottom:none;}
.h-dot{width:6px;height:6px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.h-dot.g{background:var(--g-txt);}
.h-dot.b{background:var(--r-txt);}
.h-dot.w{background:var(--w-txt);}
</style>
</head>
<body>
<div id="app"><div id="root"></div><div id="funds-modal"></div><div id="profit-note" style="display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:999;white-space:nowrap;"></div></div>
<script>
// ══ НАЧАЛЬНЫЕ ДАННЫЕ ══
const INIT_STATE = {
  cash:500, sales:15, price:60, profitPct:0.18, costPct:0.35, opexPct:0.47,
  reputation:100, score:0, goodChoices:0,
  baseSales:15,
  patentType:'invention',
  patentReceived: false,
  opexFixed:580,
  debt:0,           // накопленный долг по кредитам
  debtMonthly:0,    // ежемесячный платёж по кредиту
  totalMonths:0,    // сколько месяцев прошло в игре
  staff:4,          // количество сотрудников
};

// ══ ИСТОРИЯ ДЛЯ КНОПКИ НАЗАД ══
let history = []; // [{stageId, state}]
let st = {...INIT_STATE};
let answered = false;

// ── Начислить прибыль за N месяцев ──
// Вызывается при переходе между этапами
function accrueProfit(months) {
  if(!months || months <= 0) return 0;
  const rev = st.sales * st.price;
  const cogs = Math.round(rev * st.costPct);
  const opex = st.opexFixed || 580;
  const profitPerMonth = Math.round(rev - cogs - opex);
  const total = profitPerMonth * months;
  const debtPayments = Math.round((st.debtMonthly || 0) * months);
  let net = total - debtPayments;

  // Защита: если прибыль отрицательная — не даём потерять больше 40% кэша за один переход
  if(net < 0 && st.cash > 0) {
    const maxLoss = Math.round(st.cash * 0.4);
    net = Math.max(net, -maxLoss);
  }

  st.cash += net;
  st.totalMonths += months;

  // Конкурент уводит клиентов пока нет патента
  if(!st.patentReceived && st.sales > 3) {
    const lost = Math.floor(months / 2);
    if(lost > 0) {
      st.sales = Math.max(3, st.sales - lost);
      st._competitorLoss = (st._competitorLoss || 0) + lost;
    }
  }

  // Репутация влияет на продажи: < 70 → теряем клиентов
  if(st.reputation < 70 && st.sales > 3) {
    const repLost = Math.floor((70 - st.reputation) / 20) * Math.ceil(months / 2);
    if(repLost > 0) {
      st.sales = Math.max(3, st.sales - repLost);
      st._repLoss = (st._repLoss || 0) + repLost;
    }
  }

  return net;
}

// Расчёт прибыли для показа игроку
function monthlyProfit() {
  const f = calcFin(st);
  return f.profit;
}

// ── Проверить достаточность денег, предложить кредит если нет ──
// Возвращает true если можно продолжить, false если нет
// При нехватке — показывает модальный выбор
let _pendingCost = 0;
let _pendingCallback = null;

function checkFunds(cost, callback) {
  if(st.cash >= cost) {
    callback();
    return;
  }
  // Недостаточно денег — показываем выбор
  _pendingCost = cost;
  _pendingCallback = callback;
  showFundsModal(cost);
}

function showFundsModal(cost) {
  const shortage = cost - st.cash;
  const canCredit = st.debt < 900;
  const canKubi = !st._kubushkaUsed;
  const canFire = st.staff > 1;
  const monthProfit = monthlyProfit();

  const el = document.getElementById('funds-modal');
  if(!el) return;

  el.style.display = 'block';
  el.innerHTML = `
    <div class="funds-modal-inner">
      <div class="fm-icon">💸</div>
      <div class="fm-title">Не хватает ${shortage} тыс ₽</div>
      <div class="fm-text">На счету ${st.cash} тыс ₽, нужно ${cost} тыс ₽.<br>
        <span style="font-size:11px;opacity:.75">Прибыль компании: ~${monthProfit} тыс ₽/мес — деньги накапливаются по ходу игры.</span>
      </div>
      <div class="fm-choices">
        ${canCredit ? `<button class="fm-btn" onclick="takeLoan(${cost})">🏦 Взять кредит 600 тыс ₽<br><small>Долг: +690 тыс ₽ в конце игры</small></button>` : '<div class="fm-disabled">🏦 Кредит недоступен — превышен лимит долга</div>'}
        ${canKubi ? `<button class="fm-btn" onclick="useKubushka(${cost})">🏺 Личная кубышка руководителя<br><small>+400 тыс ₽ из личных средств (разово)</small></button>` : '<div class="fm-disabled">🏺 Кубышка уже использована</div>'}
        ${canFire ? `<button class="fm-btn warn" onclick="fireSomeone(${cost})">👋 Уволить сотрудника<br><small>−140 тыс ₽/мес расходов, но продажи −2/мес</small></button>` : ''}
        <button class="fm-btn cancel" onclick="closeFundsModal()">↩ Вернуться назад</button>
      </div>
    </div>`;
}

function updateHeaderNow() {
  const root = document.getElementById('root');
  if(!root) return;
  const hdr = root.querySelector('.header');
  if(hdr) { hdr.insertAdjacentHTML('afterend', renderHeader()); hdr.remove(); }
}

function takeLoan(cost) {
  st.cash += 600;
  st.debt += 690;
  addFundsLog('Взяли кредит 600 тыс ₽. Долг в конце игры: +690 тыс ₽');
  updateHeaderNow();
  closeFundsModal();
  if(st.cash >= cost && _pendingCallback) { const cb = _pendingCallback; _pendingCallback = null; cb(); }
  else if(st.cash < cost) showFundsModal(cost);
}

function useKubushka(cost) {
  if(st._kubushkaUsed) return;
  st.cash += 400;
  st._kubushkaUsed = true;
  addFundsLog('Личная кубышка: +400 тыс ₽ (разово)');
  updateHeaderNow();
  closeFundsModal();
  if(st.cash >= cost && _pendingCallback) { const cb = _pendingCallback; _pendingCallback = null; cb(); }
  else if(st.cash < cost) showFundsModal(cost);
}

function fireSomeone(cost) {
  st.opexFixed = Math.max(0, st.opexFixed - 140);
  st.sales = Math.max(1, st.sales - 2);
  st.staff = Math.max(1, st.staff - 1);
  addFundsLog(`Уволили сотрудника: расходы −140 тыс/мес, продажи −2/мес. Осталось сотрудников: ${st.staff}`);
  updateHeaderNow();
  closeFundsModal();
  if(st.cash >= cost && _pendingCallback) { const cb = _pendingCallback; _pendingCallback = null; cb(); }
  else if(_pendingCost > 0) showFundsModal(_pendingCost);
}

function closeFundsModal() {
  const el = document.getElementById('funds-modal');
  if(el) el.style.display = 'none';
  _pendingCost = 0;
  _pendingCallback = null;
}

let _fundsLog = [];
function addFundsLog(msg) { _fundsLog.push(msg); }

// ── ТАБЛИЦА МЕСЯЦЕВ ПО ЭТАПАМ ──
const STAGE_MONTHS = {
  1: 0, '2_letter': 1, '2_price': 1,
  '3_back_to_competitor': 1, '3_back_to_competitor_2': 2, '3_ad_budget': 1, '3_must_patent': 0,
  '3_ad_bigclient': 1, '3_competitor_copied': 3, '3_ad_overload': 0, '3_ad_penalty': 1, '3_ad_hire': 0,
  4: 1, '3_equipment': 0, '3_secret_warning': 0, '3_ad_overload': 0, '4_brief': 0, '4_no_guarantee': 1, '4_bureau_choice': 0,
  '4_delayed': 3, '4_redo': 2, '4_restart_after_rejection': 1,
  // Патентование — основные задержки
  5: 6,   // ИИП: 6 мес
  // Патентомания и другие — через effect напрямую
  '5_utility_model_warning': 0, '5_after_repatent': 0, '5_lawsuit_narrow_result': 0, '5_nda_consequence': 0, '5_lawsuit_utility': 3, '5_lawsuit_narrow': 3,
  '5_clients_from_competitor': 1,
  '5_tm': 0, '5_tm_bad': 4, '5_journal': 1,
  '5_secret': 0, '5_secret_bad': 2,
  6: 3, 7: 4, '7': 4,
  'final_bad': 0,
};

// ══ ЭТАПЫ ══
// next: число = id следующего этапа
// Ключевые ID:
// 'start' = стартовый экран
// 1 = первый выбор (письмо/цена/юрист)
// 2a,2b,2c = ветки после письма (отзывы)
// 3_回 = возврат к проблеме после ветки письма (конкурент продолжает!)
// 3a,3b,3c = ветки после цены
// 3_price_back = возврат к проблеме после ценовой ветки
// 4 = патентование
// 5 = патент получен
// 6 = масштабирование
// 7 = финальный выбор
// 'final' = финал

const STAGES = {

  // ────────────────────────────────────────────────
  // ЭТАП 1: Первый выбор
  // ────────────────────────────────────────────────
  1: {
    pathPos: 1,
    tag: 'Угроза',
    title: 'Конкурент выпустил похожий товар',
    body: 'Конкурент начал производить продукт, очень похожий на ваш. Клиенты уже спрашивают: «А чем вы лучше?» Продажи пока не упали, но тревога нарастает.',
    info: null,
    choices: [
      {
        name: '✉️ Напишу гневное письмо с требованием прекратить',
        meta: 'Бесплатно · быстро',
        type: 'bad',
        effect: s => ({ reputation: s.reputation - 10 }),
        result: {
          icon:'😬', head:'Конкурент промолчал',
          text:'Письмо отправлено, но конкурент его проигнорировал. Хуже того — он рассказал об этом в отраслевом чате. Начинают появляться негативные отзывы о вашей компании.',
          deltas:[{t:'Репутация −10',c:'dn'}],
          lesson:'Юридически незаверенные требования не имеют силы. Без патента угрожать нечем.',
          next:'2_letter'
        }
      },
      {
        name: '💸 Снижу цену и переманю его клиентов',
        meta: 'Цена −9%',
        type: 'warn',
        effect: s => ({ price: Math.round(s.price*0.91), sales: Math.round(s.sales*1.05) }),

// ══ ПУТЬ ══
const PATH_LABELS = ['Старт','Угроза','Кризис','Патент','Блок','Рост','Лидер'];

function calcFin(s) {
  const rev = s.sales * s.price;
  const cogs = Math.round(rev * s.costPct);
  const opex = s.opexFixed || 280; // фиксированные расходы цеха тыс ₽/мес
  const profit = Math.round(rev - cogs - opex);
  const profitPct = rev > 0 ? Math.round(profit / rev * 100) : 0;
  return { rev, cogs, opex, profit, profitPct };
}

function renderHeader() {
  const f = calcFin(st);
  const revStr = f.rev >= 1000 ? (f.rev/1000).toFixed(1)+' млн' : f.rev+' тыс';
  const cashColor = st.cash < 100 ? 'dn' : '';
  const debtBadge = st.debt > 0 ? `<span class="debt-badge">Долг: ${st.debt} тыс ₽</span>` : '';
  const monthsBadge = st.totalMonths > 0 ? `<span class="months-badge">${st.totalMonths} мес.</span>` : '';
  return `<div class="header">
    <div class="header-top">
      <span class="co-name">🏭 ${st.productName || 'ТехКомпания'}</span>
      <span style="font-size:12px;color:var(--txt3)">Чек: ${st.price} тыс ₽ ${monthsBadge}${debtBadge}</span>
    </div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-val ${cashColor}">${st.cash} тыс</div><div class="kpi-lbl">Свободные деньги</div></div>
      <div class="kpi"><div class="kpi-val">${st.sales}</div><div class="kpi-lbl">Продаж/мес</div></div>
      <div class="kpi"><div class="kpi-val ${f.profit < 0 ? 'dn' : 'up'}">${f.profit > 0 ? '+' : ''}${f.profit} тыс</div><div class="kpi-lbl">Прибыль/мес</div></div>
      <div class="kpi"><div class="kpi-val ${st.reputation<70?'dn':'up'}">${st.reputation}</div><div class="kpi-lbl">Репутация</div></div>
    </div>
  </div>`;
}

function renderPath(pos) {
  let html = '<div class="path-wrap"><div class="path-title">Ваш путь</div><div class="path-bar">';
  PATH_LABELS.forEach((lbl, i) => {
    const done = i < pos, active = i === pos;
    html += `<div class="ps">
      <div class="pd ${done?'done':''} ${active?'active':''}">${done?'✓':(i+1)}</div>
      <div class="pl ${active?'active':''}">${lbl}</div>
    </div>`;
    if(i < PATH_LABELS.length-1) html += `<div class="pline ${done?'done':''}"></div>`;
  });
  return html + '</div></div>';
}

function renderHistory() {
  if(history.length === 0) return '';
  const items = history.slice(-4).reverse().map(h => {
    const stage = STAGES[h.stageId];
    if(!stage) return '';
    return `<div class="h-item"><div class="h-dot g"></div><span>${stage.tag}: ${stage.title}</span></div>`;
  }).join('');
  return `<div class="history"><div class="history-title">История решений</div>${items}</div>`;
}

function initCollapsible() {
  // На мобильных: схлопываем длинные тексты card-body
  if(window.innerWidth > 540) return;
  document.querySelectorAll('.card-body').forEach(el => {
    if(el.scrollHeight > 100 && !el.dataset.collapsible) {
      el.dataset.collapsible = '1';
      el.classList.add('collapsible-text','collapsed');
      const btn = document.createElement('button');
      btn.className = 'show-more-btn';
      btn.textContent = '▾ Показать полностью';
      btn.onclick = () => {
        el.classList.toggle('collapsed');
        btn.textContent = el.classList.contains('collapsed') ? '▾ Показать полностью' : '▴ Свернуть';
      };
      el.parentNode.insertBefore(btn, el.nextSibling);
    }
  });
}

function renderStage(stageId) {
  const stage = STAGES[stageId];
  if(!stage) { goFinal(); return; }

  // Пропустить этап если условие выполнено
  if(stage._skipIfFn && stage._skipIfFn(st)) {
    renderStage(stage._skipNext || 4);
    return;
  }

  answered = false;

  const choicesHTML = stage.choices.map((c, i) => `
    <button class="choice" id="ch${i}" onclick="choose('${stageId}',${i})">
      <div class="cn">${c.name}</div>
      ${c.meta ? `<div class="cm">${c.meta}</div>` : ''}
    </button>`).join('');

  const warnText = stage._warnFn ? stage._warnFn(st) : stage.warn;
  const warnHTML = warnText ? `<div class="warn-strip">⚠️ ${warnText}</div>` : '';
  const infoHTML = stage.info ? `<div class="info-box">💡 ${stage.info}</div>` : '';
  const backHTML = history.length > 0
    ? `<button class="btn-back" onclick="goBack()">← Вернуться назад и выбрать иначе</button>`
    : '';

  document.getElementById('root').innerHTML = `
    ${renderHeader()}
    ${renderPath(stage.pathPos || 0)}
    ${backHTML}
    <div class="card">
      <div class="card-tag">${stage.tag}</div>
      <div class="card-title">${stage.title}</div>
      <div class="card-body">${stage._bodyFn ? stage._bodyFn(st) : stage.body}${warnHTML}${infoHTML}</div>
    </div>
    <div class="choices">${choicesHTML}</div>
    <div class="result" id="res"></div>
    <button class="btn-next" id="btn-next" onclick="goNext()">Далее →</button>
    ${renderHistory()}`;
  window.scrollTo(0,0);
  initCollapsible();
}

let _nextStageId = null;

function choose(stageId, idx) {
  if(answered) return;

  const stage = STAGES[stageId];
  const c = stage.choices[idx];

  // Определяем стоимость выбора из эффекта
  const testPatch = c.effect({...st});
  const cashDiff = (testPatch.cash !== undefined) ? testPatch.cash - st.cash : 0;
  const cost = cashDiff < 0 ? Math.abs(cashDiff) : 0;

  // Если не хватает денег — показываем модал вместо покупки
  if(cost > 0 && st.cash < cost) {
    checkFunds(cost, () => { _executeChoice(stageId, idx); });
    return;
  }

  _executeChoice(stageId, idx);
}

function _executeChoice(stageId, idx) {
  if(answered) return;
  answered = true;
  const stage = STAGES[stageId];
  const c = stage.choices[idx];
  const effectiveType = c._typeFn ? c._typeFn(st) : c.type;

  // Сохраняем в историю ДО применения эффекта
  history.push({ stageId, state: {...st} });

  // Применяем эффект
  const patch = c.effect({...st});
  Object.assign(st, patch);
  // НЕ ограничиваем cash снизу — долг возможен
  st.sales = Math.max(0, st.sales);
  st.reputation = Math.max(0, Math.min(110, st.reputation));
  st.profitPct = Math.max(0.05, Math.min(0.40, st.profitPct));

  // Визуал
  document.querySelectorAll('.choice').forEach((btn, i) => {
    btn.disabled = true;
    if(i === idx) btn.classList.add('s' + effectiveType[0]);
  });
  const r = c.result;
  const dl = (r._deltasFn ? r._deltasFn(st) : (r.deltas||[])).map(d=>`<span class="delta ${d.c}">${d.t}</span>`).join('');
  const rHead = r._headFn ? r._headFn(st) : r.head;
  const rText = (r._textFn ? r._textFn(st) : r.text).replace(/\n/g,'<br>');
  const rLesson = r._lessonFn ? r._lessonFn(st) : r.lesson;
  const rNext = r._nextFn ? r._nextFn(st) : r.next;
  const res = document.getElementById('res');
  res.className = 'result ' + effectiveType + ' show';

  // Добавляем уведомление о долге если cash < 0
  const debtWarning = st.cash < 0
    ? `<div style="background:var(--r-bg);border:1px solid var(--r-brd);border-radius:9px;padding:8px 12px;margin-top:8px;font-size:12px;color:var(--r-txt);">⚠️ Счёт ушёл в минус (${st.cash} тыс ₽). Нужно пополнить — кредит, кубышка или другие решения.</div>`
    : '';

  res.innerHTML = `
    <div class="ri">${r.icon}</div>
    <div class="rh">${rHead}</div>
    <div class="rt">${rText}</div>
    ${dl ? `<div class="deltas">${dl}</div>` : ''}
    ${debtWarning}
    ${rLesson ? `<div class="rl">📚 ${rLesson}</div>` : ''}`;

  _nextStageId = rNext;
  const btn = document.getElementById('btn-next');
  btn.className = 'btn-next show';
  btn.textContent = r.next === 'final' || r.next === 'final_bad' ? 'Посмотреть итоги →'
    : r.next === 'restart' ? 'Играть заново' : 'Далее →';

  // Обновить шапку надёжно
  const root = document.getElementById('root');
  if(root) {
    const hdr = root.querySelector('.header');
    if(hdr) {
      hdr.insertAdjacentHTML('afterend', renderHeader());
      hdr.remove();
    }
  }
}

function goNext() {
  if(_nextStageId === 'restart') { restartGame(); return; }
  if(_nextStageId === 'final' || !STAGES[_nextStageId]) { goFinal(); return; }

  // Начислить прибыль за время прохождения текущего этапа
  const months = STAGE_MONTHS[_nextStageId] || 0;
  if(months > 0) {
    const earned = accrueProfit(months);
    if(Math.abs(earned) >= 50) {
      const sign = earned >= 0 ? '+' : '';
      const lossNote = st._competitorLoss > 0 ? ` (конкурент увёл ${st._competitorLoss} кл.)` : '';
      st._competitorLoss = 0;
      const note = document.getElementById('profit-note');
      if(note) {
        note.textContent = `⏳ Прошло ${months} мес. Компания заработала: ${sign}${earned} тыс ₽ (прибыль поступила на счёт)${lossNote}`;
        note.style.display = 'block';
        setTimeout(()=>{ note.style.display='none'; }, 4000);
      }
    }
  }

  // Патент получен — конкурент больше не уводит клиентов
  if(_nextStageId === 5 || _nextStageId === '5') {
    st.patentReceived = true;
  }
  // Показываем 3_secret_warning только один раз
  if(_nextStageId === '3_secret_warning') {
    st._secretWarningShown = true;
  }
  // Иск с узким патентом — перенаправить
  if(_nextStageId === '5_clients_from_competitor' && st._narrowPatent) {
    renderStage('5_lawsuit_narrow');
    return;
  }

  // Уведомление о потере продаж из-за репутации
  if(st._repLoss > 0) {
    const note = document.getElementById('profit-note');
    if(note) {
      note.textContent = `📉 Репутация ${st.reputation} — потеряно ${st._repLoss} клиентов из-за отзывов`;
      note.style.display = 'block';
      setTimeout(()=>{ note.style.display='none'; }, 4000);
    }
    st._repLoss = 0;
  }

  renderStage(_nextStageId);
}

function goBack() {
  if(history.length === 0) return;
  const prev = history.pop();
  st = {...prev.state};
  _nextStageId = null;
  answered = false;
  renderStage(prev.stageId);
}

function getRating(score) {
  const sc = score !== undefined ? score : st.score;
  if(sc >= 4500) return {title:'Технологический лидер рынка', emoji:'🏆', color:'var(--g-txt)'};
  if(sc >= 3000) return {title:'Основатель технологической империи', emoji:'🎖', color:'var(--b-txt)'};
  if(sc >= 1800) return {title:'Директор по интеллектуальной собственности', emoji:'⚙️', color:'var(--w-txt)'};
  if(sc >= 800)  return {title:'Главный инженер-изобретатель', emoji:'🔧', color:'var(--txt2)'};
  return {title:'Руководитель на старте', emoji:'🌱', color:'var(--txt3)'};
}

function goFinal() {
  // Начисляем финальную прибыль за последний период
  accrueProfit(2);
  // Погашаем долг из кассы
  if(st.debt > 0) st.cash -= st.debt;
  const finalScore = st.score + Math.max(0, st.cash) - st.debt;
  const r = getRating(finalScore);
  const f = calcFin(st);

function getLessons() {
  const MAX_SCORE = 5800; // максимально возможный счёт при оптимальном прохождении
  const totalDecisions = history.length;
  const goodPct = totalDecisions > 0 ? Math.round(st.goodChoices / totalDecisions * 100) : 0;
  const badDecisions = totalDecisions - st.goodChoices;

  // ── Ключевые решения ──
  const keyDecisions = [];

  if(st._secretDone) {
    keyDecisions.push({ok:true,  text:'✅ Оформили NDA и документы о передаче прав — технологии защищены от ухода сотрудников'});
  } else {
    keyDecisions.push({ok:false, text:'❌ Не оформили NDA — технолог смог уйти к конкуренту с вашими ноу-хау'});

  if(st._usedIIP) {

  if(st._tmRegistered) {
    keyDecisions.push({ok:true,  text:'✅ Зарегистрировали товарный знак — название продукта защищено'});

    keyDecisions.push({ok:false, text:'❌ Не зарегистрировали товарный знак — конкурент мог использовать похожее название'});

  if(st.patentReceived) {
    keyDecisions.push({ok:true,  text:'✅ Получили патент и остановили конкурента'});

    keyDecisions.push({ok:false, text:'❌ Патент не получен — конкурент продолжает работать'});

  if(st.debt > 0) {

  if(st._usedPatentomaniya) improvements.push('Каждый лишний месяц ожидания патента = упущенная прибыль. ИИП сделал бы за 6 мес вместо 14');

  if(st.debt > 0) improvements.push('Правильная последовательность решений позволяет пройти игру без кредита');

function selectProduct(key) {
  const p = PRODUCTS_DATA[key];
  selectedProduct = key;
  const f = {
    rev: p.sales * p.price,
    cogs: Math.round(p.sales * p.price * p.costPct),
    profit: Math.round(p.sales * p.price - p.sales * p.price * p.costPct - p.opexFixed)
  };
  st.price = p.price;
  st.sales = p.sales;
  st.baseSales = p.sales;
  st.cash = p.cash;
  st.opexFixed = p.opexFixed;
  st.costPct = p.costPct;
  st.profitPct = 0.18;
  st.patentType = 'invention';
  st.patentReceived = false;
  st._competitorLoss = 0;
  st._equipmentDone = false;
  st._secretWarningShown = false;
  st.debt = 0;
  st.debtMonthly = 0;
  st.totalMonths = 0;
  st.staff = 4;
  st._kubushkaUsed = false;
  st.productName = p.emoji + ' ' + p.fullName;
  st.productKey = key;

  STAGES[1].body = p.competitorText;
  STAGES[1].info = `Сейчас: ${p.sales} продаж/мес × ${p.price} тыс ₽ = ${f.rev} тыс ₽ выручки/мес. Себестоимость ${Math.round(p.costPct*100)}% = ${f.cogs} тыс ₽. Расходы цеха (аренда, зарплаты) = ${p.opexFixed} тыс ₽/мес. Операционная прибыль = ~${f.profit} тыс ₽/мес. Запас: 500 тыс ₽.`;

  renderStage(1);
}

        const profit = Math.round(rev - rev*p.costPct - p.opexFixed);
        return `<div onclick="selectProduct('${key}')" style="background:var(--bg3);border:1.5px solid var(--brd);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s;" onmouseover="this.style.borderColor='var(--brd2)'" onmouseout="this.style.borderColor='var(--brd)'">
          <div style="font-size:15px;font-weight:600;margin-bottom:4px;">${p.name}</div>
          <div style="font-size:13px;color:var(--txt2);margin-bottom:10px;line-height:1.6">${p.desc}</div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;">
            <div style="background:var(--bg2);border-radius:8px;padding:7px 9px;text-align:center;">
              <div style="font-size:14px;font-weight:600">${p.price} тыс</div>
              <div style="font-size:10px;color:var(--txt3)">чек</div>
            </div>
            <div style="background:var(--bg2);border-radius:8px;padding:7px 9px;text-align:center;">
              <div style="font-size:14px;font-weight:600">${p.sales}/мес</div>
              <div style="font-size:10px;color:var(--txt3)">продаж</div>
            </div>
            <div style="background:var(--bg2);border-radius:8px;padding:7px 9px;text-align:center;">
              <div style="font-size:14px;font-weight:600">${rev} тыс</div>
              <div style="font-size:10px;color:var(--txt3)">выручка/мес</div>
            </div>
            <div style="background:var(--bg2);border-radius:8px;padding:7px 9px;text-align:center;">
              <div style="font-size:14px;font-weight:600;color:var(--g-txt)">+${profit} тыс</div>
              <div style="font-size:10px;color:var(--txt3)">прибыль/мес</div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  window.scrollTo(0,0);
}

renderStart();
</script>
</body>
</html>
